<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230b0f1a'/><polyline points='4,24 10,18 16,20 22,10 28,6' fill='none' stroke='white' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/><polygon points='24,5 29,5 29,10' fill='white' opacity='0.8'/></svg>">
<title>PO Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Noto Sans JP',sans-serif;background:#0b0f1a;color:#e2e8f0;font-size:14px;display:flex;flex-direction:column}
nav{display:flex;align-items:center;gap:12px;padding:14px 24px;background:#0b0f1a;border-bottom:1px solid #1e2d4d;flex-shrink:0}
.title{font-size:15px;font-weight:700;color:#e2e8f0}
.sp{flex:1}
.upd{font-size:11px;color:#475569}
.page{padding:22px;flex:1;display:flex;flex-direction:column;min-height:0}
/* stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.sc{background:#131a2e;border:1px solid #1e2d4d;border-radius:10px;padding:14px}
.sl{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.sv{font-size:22px;font-weight:400;font-family:'Meiryo','メイリオ',sans-serif}
.pos{color:#34d399}.neg{color:#f87171}.acc{color:#60a5fa}.warn{color:#fbbf24}
/* filters */
.fs{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.fg label{font-size:11px;color:#94a3b8;margin-right:4px}
.mcb{font-size:11px;color:#94a3b8;cursor:pointer;user-select:none}
.mcb input{margin-right:2px;accent-color:#475569}
select,input[type=text]{background:#0d1220;border:1px solid #1e3a5f;color:#e2e8f0;padding:5px 8px;border-radius:6px;font-size:12px;font-family:inherit;outline:none}
select:focus,input:focus{border-color:#3b82f6}
/* table */
.tw{background:#131a2e;border:1px solid #1e2d4d;border-radius:10px;overflow:hidden;flex:1;display:flex;flex-direction:column;min-height:0}
.sc2{overflow:auto;flex:1;min-height:0}
table{width:100%;border-collapse:collapse;font-size:11px;min-width:0}
thead{position:sticky;top:0;z-index:2}
th{background:#0d1220;padding:6px 5px;text-align:left;color:#64748b;font-weight:500;border-bottom:1px solid #1e2d4d;white-space:nowrap;cursor:pointer}
th:hover{color:#93c5fd}
td{padding:5px 5px;border-bottom:1px solid #111827;white-space:nowrap;font-size:11px}
tr:hover td{background:#0e1525}
.num{text-align:right;font-family:'Meiryo','メイリオ',sans-serif;padding-left:10px;padding-right:8px}
th.num{padding-left:10px;padding-right:8px}
/* badges */
.b{display:inline-block;font-size:10px;padding:2px 6px;border-radius:4px;font-weight:500}
.b-r{background:#1e293b;color:#94a3b8}
.b-n{background:#1e293b;color:#94a3b8}
.b-c{background:#1e293b;color:#94a3b8}
.b-ban{background:#1e293b;color:#94a3b8}
.b-tai{background:#1e293b;color:#94a3b8}
.b-pend{background:#3b2700;color:#fbbf24}
.b-next{background:#1a2a40;color:#60a5fa}
.b-done{background:#1e293b;color:#94a3b8}
/* scrollbar */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#0b0f1a}
::-webkit-scrollbar-thumb{background:#1e3a5f;border-radius:3px}
@media(max-width:700px){.stats{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<nav>
  <span class="title">PO Tracker</span>
  <span class="sp"></span>
  <a href="https://kabutan.jp/news/marketnews/?category=9" target="_blank" rel="noopener" style="color:#e2e8f0;font-size:12px;text-decoration:none;margin-right:16px">株探</a>
  <a href="https://www.rakuten-sec.co.jp/ITS/Companyfile/stabilization.html" target="_blank" rel="noopener" style="color:#e2e8f0;font-size:12px;text-decoration:none;margin-right:16px">安定操作</a>
  <a href="https://kabu.96ut.com/article/category/po/" target="_blank" rel="noopener" style="color:#e2e8f0;font-size:12px;text-decoration:none;margin-right:16px">96ut</a>
  <a href="https://jpx-jquants.com/ja" target="_blank" rel="noopener" style="color:#e2e8f0;font-size:12px;text-decoration:none;margin-right:16px">Data Source：J-Quants</a>
  <span class="upd" id="upd-label"></span>
</nav>

<div class="page">
  <div class="fs">
    <div class="fg"><label>年</label>
      <select id="fy" onchange="render()"><option value="">全年</option></select></div>
    <div class="fg"><label>種別</label>
      <select id="ft" onchange="render()"><option value="">全種別</option><option value="普通">普通</option><option value="リート">REIT</option></select></div>
    <div class="fg"><label>信用区分</label>
      <select id="fa" onchange="render()"><option value="">全て</option><option value="貸借">貸借</option><option value="信用">信用</option><option value="売禁">貸借(売禁)</option></select></div>
    <div class="fg"><label>主幹事</label>
      <span id="fm-checks" style="display:inline-flex;gap:6px;flex-wrap:wrap"></span></div>
    <div class="fg"><label>dis率</label>
      <select id="fd" onchange="render()"><option value="">全て</option><option value="0-3">~3%</option><option value="3-5">3~5%</option><option value="5-7">5~7%</option><option value="7-">7%~</option></select></div>
    <div class="fg"><label>PO規模</label>
      <select id="fs" onchange="render()"><option value="">全て</option><option value="0-50">~50億</option><option value="50-100">50~100億</option><option value="100-500">100~500億</option><option value="500-1000">500~1000億</option><option value="1000-">1000億~</option></select></div>
    <div class="fg"><label>規模割合</label>
      <select id="fp" onchange="render()"><option value="">全て</option><option value="0-5">~5%</option><option value="5-10">5~10%</option><option value="10-20">10~20%</option><option value="20-">20%~</option></select></div>
    <div class="fg"><label>希薄化率</label>
      <select id="fdi" onchange="render()"><option value="">全て</option><option value="0-5">~5%</option><option value="5-10">5~10%</option><option value="10-15">10~15%</option><option value="15-">15%~</option></select></div>
    <div class="fg"><label>GUGD</label>
      <select id="fgu" onchange="render()"><option value="">全て</option><option value="GU">🟢 GU</option><option value="GD">🔴 GD</option><option value="flat">フラット</option></select></div>
  </div>

  <div class="stats">
    <div class="sc"><div class="sl">対象件数</div><div class="sv" style="color:#e2e8f0" id="s0">–</div></div>
    <div class="sc"><div class="sl">平均騰落率（始値）</div><div class="sv" id="s1">–</div></div>
    <div class="sc"><div class="sl">平均騰落率（終値）</div><div class="sv" id="s2">–</div></div>
    <div class="sc"><div class="sl">受渡日騰落率</div><div class="sv" id="s3">–</div></div>
  </div>

  <div class="tw">
    <div class="sc2"><table>
      <thead>
      <tr>
        <th onclick="sort(0)">年</th><th>状態</th><th onclick="sort(2)">コード</th><th onclick="sort(1)">銘柄</th>
        <th>種別</th><th>信用区分</th>
        <th>主幹事<br><a href="https://x.com/ipopo16" target="_blank" rel="noopener" style="color:#64748b;font-weight:400;text-decoration:none;font-size:12px">(参考X)</a></th>
        <th class="num" onclick="sort(7)">dis率</th>
        <th class="num" onclick="sort(8)">PO規模<br>(億円)</th>
        <th class="num" onclick="sort(9)">規模割合<br>(対時価総額)</th>
        <th class="num" onclick="sort(10)">希薄化率</th>
        <th class="num" onclick="sort(11)">PO発表翌日<br>の始値</th>
        <th onclick="sort(20)" title="翌日始値が発表日終値より 0.5%以上アゲ→🟢GU / 0.5%以上サゲ→🔴GD / ±0.5%以内→–">翌日<br>GUGD</th>
        <th class="num" onclick="sort(21)" title="9:15時点の価格 vs 翌日始値">9:15<br>騰</th>
        <th class="num" onclick="sort(22)" title="9:30時点の価格 vs 翌日始値">9:30<br>騰</th>
        <th class="num" onclick="sort(23)" title="前場引け（11:30）vs 翌日始値">前場<br>引騰</th>
        <th class="num" onclick="sort(12)">価格決定日<br>の始値</th>
        <th class="num" onclick="sort(13)">価格決定日<br>の終値</th>
        <th class="num" onclick="sort(14)" title="翌日寄付で入り、決定日の寄付で出た場合の損益率&#10;(決定日始値 − 翌日始値) ÷ 翌日始値 × 100">決定日<br>騰落率(始)</th>
        <th class="num" onclick="sort(15)" title="翌日寄付で入り、決定日の引けで出た場合の損益率&#10;(決定日終値 − 翌日始値) ÷ 翌日始値 × 100">決定日<br>騰落率(終)</th>
        <th class="num" onclick="sort(16)">受渡日<br>始値</th>
        <th onclick="sort(19)" title="0.5%以上アゲ→🟢GU ／ 0.5%以上サゲ→🔴GD ／ ±0.5%以内→–">受渡日<br>GUGD</th>
        <th class="num" onclick="sort(17)">受渡日<br>終値</th>
        <th class="num" onclick="sort(18)">受渡日<br>騰落率</th>
      </tr></thead>
      <tbody id="tb"></tbody>
    </table></div>
  </div>
</div>

<script>
/* ─────── 状態 ────────────────────────────────────────────────────────────── */
let newRecs=[], combined=[], filt=[], sCol=-1, sAsc=false;

function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

/* ─────── データ読み込み ──────────────────────────────────────────────────── */
async function loadNewRecs(){
  try{
    const res = await fetch("./data/po_records.json?t="+Date.now());
    if(!res.ok) return;
    const json = await res.json();
    newRecs = (json.records || json || []);
    const upd = json.last_updated;
    if(upd) document.getElementById("upd-label").textContent =
      "最終更新: "+upd.slice(0,16).replace("T"," ");
  }catch(e){
    console.warn("JSON読み込みスキップ（ローカル確認時は正常）:",e.message);
  }
}

function lendingOf(r){
  if(r.lending_type==="貸借"||r.lending_type==="信用") return r.lending_type;
  if(r.alert==="売り禁") return "売禁";
  if(r.alert==="注意")   return "信用";
  return "貸借";
}
function recToRow(r, src){
  return {
    src, id:r.id, code:r.code||"", year:r.year||new Date().getFullYear(),
    name:r.name, type:r.type, alert:r.alert||"", lending:lendingOf(r),
    scale:r.po_scale||r.scale, pct:r.po_pct||r.pct,
    dilution:r.dilution,
    nextOpen:r.next_open, maxPrice:r.max_price, openToMax:r.open_to_max,
    nextDayGuPct:r.next_day_gu_pct, ret915:r.next_day_915_ret, ret930:r.next_day_930_ret, retMorning:r.next_day_morning_ret,
    decOpen:r.dec_open, decClose:r.dec_close,
    retOpen:r.ret_open, retClose:r.ret_close,
    delOpen:r.delivery_open, delClose:r.delivery_close, delRet:r.delivery_ret,
    prevClose:r.prev_close_before_delivery, gapPct:r.delivery_gap_pct,
    leadManagers:r.lead_managers||[], coManagers:r.co_managers||[],
    memo:r.memo||"", status:((r.delivery_open&&r.delivery_close)||(r.delivery_date&&new Date(r.delivery_date)<new Date())||(r.announce_date&&new Date(r.announce_date)<new Date(Date.now()-30*864e5)))?"complete":(r.status||"pending"), announceDate:r.announce_date||"",
    marketCap:r.market_cap, shares:r.shares_outstanding,
    discountRate:r.discount_rate, discountRange:r.discount_range||"",
    newShares:r.new_shares, soldShares:r.sold_shares,
    decisionDate:r.decision_date, deliveryDate:r.delivery_date,
  };
}
function buildCombined(){
  const hist = newRecs.filter(r=>r.id&&r.id.startsWith("csv_")).map(r=>recToRow(r,"hist"));
  const nw   = newRecs.filter(r=>!r.id||!r.id.startsWith("csv_")).map(r=>recToRow(r,"new"));
  combined   = [...hist,...nw];
}

/* ─────── フィルタ ────────────────────────────────────────────────────────── */
function rangeMatch(val,range){
  if(!range||val==null) return !range;
  const [lo,hi]=range.split("-").map(Number);
  if(isNaN(hi)) return val>=lo;
  return val>=lo&&val<hi;
}
function getFiltered(){
  const yr=document.getElementById("fy").value;
  const tp=document.getElementById("ft").value;
  const al=document.getElementById("fa").value;
  const checkedMgrs=getCheckedManagers();
  const allCbs=document.querySelectorAll("#fm-checks input[type=checkbox]");
  const mgrFilterActive=allCbs.length>0&&checkedMgrs.length<allCbs.length;
  const fd=document.getElementById("fd").value;
  const fs=document.getElementById("fs").value;
  const fp=document.getElementById("fp").value;
  const fdi=document.getElementById("fdi").value;
  const fgu=document.getElementById("fgu").value;
  return combined.filter(r=>{
    if(yr&&r.year!=+yr) return false;
    if(tp&&r.type!==tp) return false;
    if(al&&r.lending!==al) return false;
    if(mgrFilterActive){
      const abbrs=(r.leadManagers||[]).map(abbrManager);
      if(!abbrs.some(a=>checkedMgrs.includes(a))) return false;
    }
    if(fd&&!rangeMatch(r.discountRate,fd)) return false;
    if(fs&&!rangeMatch(r.scale,fs)) return false;
    if(fp&&!rangeMatch(r.pct,fp)) return false;
    if(fdi&&!rangeMatch(r.dilution,fdi)) return false;
    if(fgu){
      if(r.gapPct==null) return false;
      if(fgu==="GU" && r.gapPct<0.5) return false;
      if(fgu==="GD" && r.gapPct>-0.5) return false;
      if(fgu==="flat" && (r.gapPct>=0.5||r.gapPct<=-0.5)) return false;
    }
    return true;
  });
}

function avg(a){return a.length?a.reduce((x,y)=>x+y,0)/a.length:null}
function pctStr(v,d=1){return v===0?"0%":v.toFixed(d)+"%"}
function fmt(v,d=1){
  if(v==null) return "–";
  if(v===0)   return "0%";
  return (v>0?"+":"")+v.toFixed(d)+"%";
}
function fmtCell(v){
  if(v==null) return '<span style="color:#334155">–</span>';
  if(v===0)   return '<span style="color:#64748b">0%</span>';
  const s=Math.abs(v).toFixed(1)+"%";
  if(v>0) return `<span class="pos">+${s}</span>`;
  return `<span class="neg">-${s}</span>`;
}

/* ─────── フィルタ動的生成 ─────────────────────────────────────────────────── */
function populateFilters(){
  // 年
  const selY=document.getElementById("fy");
  const curY=selY.value;
  const yrs=[...new Set(combined.map(r=>r.year))].sort();
  while(selY.options.length>1) selY.remove(1);
  yrs.forEach(y=>{const o=document.createElement("option");o.value=y;o.textContent=y;selY.add(o);});
  selY.value=curY;
  // 主幹事チェックボックス
  const wrap=document.getElementById("fm-checks");
  const mgrs=["野","大","み","日","三"];
  if(!wrap.children.length){
    mgrs.forEach(m=>{
      const lbl=document.createElement("label");lbl.className="mcb";
      const cb=document.createElement("input");cb.type="checkbox";cb.checked=true;cb.value=m;
      cb.onchange=()=>render();
      lbl.appendChild(cb);lbl.appendChild(document.createTextNode(m));
      wrap.appendChild(lbl);
    });
  }
}
function getCheckedManagers(){
  const cbs=document.querySelectorAll("#fm-checks input[type=checkbox]");
  const checked=[];
  cbs.forEach(cb=>{if(cb.checked) checked.push(cb.value);});
  return checked;
}

/* ─────── テーブル ───────────────────────────────────────────────────────── */
function statusBadge(s){
  if(s==="complete") return {label:"済",cls:"b-done"};
  return {label:"中",cls:"b-pend"};
}

/* 主幹事証券の略称 */
function abbrManager(name){
  if(!name) return "";
  if(name.includes("野村")) return "野";
  if(name.includes("大和")) return "大";
  if(name.includes("日興")) return "日";
  if(name.includes("モルガン")||name.includes("JP")||name.includes("ＪＰ")) return "三";
  if(name.includes("みずほ")) return "み";
  if(name.includes("SBI")||name.includes("ＳＢＩ")) return "S";
  if(name.includes("岡三")) return "岡";
  if(name.includes("楽天")) return "楽";
  if(name.includes("ゴールドマン")) return "GS";
  if(name.includes("シティ")) return "Ci";
  if(name.includes("BofA")||name.includes("バンカメ")) return "BA";
  return name.charAt(0);
}
const MGR_ORDER={"野":0,"大":1,"み":2,"日":3,"三":4,"S":5,"岡":6,"楽":7,"GS":8,"Ci":9,"BA":10};
function abbrManagers(list){
  if(!list||!list.length) return "";
  const abbrs=[...new Set(list.map(abbrManager))];
  abbrs.sort((a,b)=>(MGR_ORDER[a]??99)-(MGR_ORDER[b]??99));
  return abbrs.length>5 ? abbrs.slice(0,5).join("")+"…" : abbrs.join("");
}

function renderTable(data){
  document.getElementById("tb").innerHTML=data.map(r=>`<tr>
    <td style="color:#64748b;font-family:monospace">${r.year}</td>
    <td>${(()=>{const b=statusBadge(r.status);return `<span class="b ${b.cls}">${b.label}</span>`;})()}</td>
    <td style="color:#64748b;font-family:monospace;font-size:11px">${r.code||"–"}</td>
    <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis" title="${esc(r.name)}">${r.code?`<a href="https://kabutan.jp/stock/chart?code=${esc(r.code)}" target="_blank" rel="noopener" style="color:#e2e8f0;text-decoration:none">${esc(r.name)}</a>`:esc(r.name)}</td>
    <td><span class="b ${r.type==="リート"?"b-r":"b-n"}">${esc(r.type)}</span></td>
    <td><span class="b ${r.lending==="貸借"?"b-tai":r.lending==="信用"?"b-c":"b-ban"}">${r.lending==="売禁"?"貸借(売禁)":esc(r.lending)}</span></td>
    <td style="font-family:'Meiryo','メイリオ',sans-serif;max-width:70px;overflow:hidden;text-overflow:ellipsis" title="${esc((r.leadManagers||[]).slice().sort((a,b)=>(MGR_ORDER[abbrManager(a)]??99)-(MGR_ORDER[abbrManager(b)]??99)).join(' / '))}">${esc(abbrManagers(r.leadManagers))||"–"}</td>
    <td class="num">${r.discountRate!=null?pctStr(r.discountRate):"–"}</td>
    <td class="num">${r.scale?r.scale.toLocaleString():"–"}</td>
    <td class="num">${r.pct!=null?pctStr(r.pct):"–"}</td>
    <td class="num">${r.dilution!=null?pctStr(r.dilution):"–"}</td>
    <td class="num">${r.nextOpen?r.nextOpen.toLocaleString():"–"}</td>
    <td>${r.nextDayGuPct==null?'–':(r.nextDayGuPct>=0.5?'<span style="color:#34d399">GU</span>':r.nextDayGuPct<=-0.5?'<span style="color:#f87171">GD</span>':'–')}</td>
    <td class="num">${fmtCell(r.ret915)}</td>
    <td class="num">${fmtCell(r.ret930)}</td>
    <td class="num">${fmtCell(r.retMorning)}</td>
    <td class="num">${r.decOpen?r.decOpen.toLocaleString():"–"}</td>
    <td class="num">${r.decClose?r.decClose.toLocaleString():"–"}</td>
    <td class="num">${fmtCell(r.retOpen)}</td>
    <td class="num">${fmtCell(r.retClose)}</td>
    <td class="num">${r.delOpen?r.delOpen.toLocaleString():"–"}</td>
    <td title="${r.prevClose?`前日終値 ${r.prevClose.toLocaleString()} → 始値 ${r.delOpen?r.delOpen.toLocaleString():""} (${r.gapPct!=null?(r.gapPct>0?'+':'')+r.gapPct+'%':'–'})`:''}">${r.gapPct==null?'–':(r.gapPct>=0.5?'<span style="color:#34d399">GU</span>':r.gapPct<=-0.5?'<span style="color:#f87171">GD</span>':'–')}</td>
    <td class="num">${r.delClose?r.delClose.toLocaleString():"–"}</td>
    <td class="num">${fmtCell(r.delRet)}</td>
  </tr>`).join("");
}

function sort(col){
  if(sCol===col) sAsc=!sAsc; else{sCol=col;sAsc=true;}
  const keys=["year","name","code","status","type","lending","leadMgr","discountRate","scale","pct","dilution","nextOpen","decOpen","decClose","retOpen","retClose","delOpen","delClose","delRet","gapPct","nextDayGuPct","ret915","ret930","retMorning"];
  filt.sort((a,b)=>{
    const va=a[keys[col]],vb=b[keys[col]];
    if(va==null) return 1; if(vb==null) return -1;
    return sAsc?(va>vb?1:-1):(va<vb?1:-1);
  });
  renderTable(filt);
}

/* ─────── メイン描画 ─────────────────────────────────────────────────────── */
function render(){
  buildCombined();
  populateFilters();
  filt=getFiltered();
  if(sCol===-1){
    // デフォルト: 発表日降順（新しいものが上）。announce_date 欠損時は year-01-01 を使用
    const sortKey=r=>r.announceDate||`${r.year}-01-01`;
    filt.sort((a,b)=>sortKey(b).localeCompare(sortKey(a)));
  }
  const opens=filt.map(r=>r.retOpen).filter(v=>v!=null);
  const closes=filt.map(r=>r.retClose).filter(v=>v!=null);
  const avgO=avg(opens),avgC=avg(closes);
  const dels=filt.map(r=>r.delRet).filter(v=>v!=null);
  const avgD=avg(dels);

  document.getElementById("s0").textContent=filt.length;
  const s1=document.getElementById("s1");
  s1.textContent=avgO!=null?fmt(avgO):"–";
  s1.className="sv "+(avgO!=null?(avgO>=0?"pos":"neg"):"");
  const s2=document.getElementById("s2");
  s2.textContent=avgC!=null?fmt(avgC):"–";
  s2.className="sv "+(avgC!=null?(avgC>=0?"pos":"neg"):"");
  const s3=document.getElementById("s3");
  s3.textContent=avgD!=null?fmt(avgD):"–";
  s3.className="sv "+(avgD!=null?(avgD>=0?"pos":"neg"):"");

  renderTable(filt);
}

/* ─────── 初期化 ─────────────────────────────────────────────────────────── */
(async()=>{
  await loadNewRecs();
  render();
})();
</script>
